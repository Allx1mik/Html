<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Posts with Users</title>
    <style>
        .post-card {
            border: 1px solid #ff5d5d;
            border-radius: 15px;
            padding: 8px;
            margin: 16px 0;
            box-shadow: 0 2px 4px rgba(0, 255, 81, 0.1);
        }
        .post-header {
            font-weight: bold;
            margin-bottom: 8px;
            color: #3a1cc0;
            border-bottom: 1px solid #368fce;
            padding-bottom: 20px;
        }
        .post-title {
            font-size: 1.5em;
            margin-bottom: 8px;
            color: #444;
        }
        .post-body {
            color: #000000;
        }
    </style>
</head>
<body>
    <div id="posts-container"></div>

    <script>
        async function fetchData() {
            try {
                // Получаем пользователей и посты параллельно
                const [usersResponse, postsResponse] = await Promise.all([
                    fetch('https://jsonplaceholder.typicode.com/users'),
                    fetch('https://jsonplaceholder.typicode.com/posts')
                ]);
                
                const users = await usersResponse.json();
                const posts = await postsResponse.json();
                
                displayPosts(users, posts);
            } catch (error) {
                console.error('Error fetching data:', error);
                document.getElementById('posts-container').innerHTML = 
                    '<p>Error loading posts. Please try again later.</p>';
            }
        }

        function displayPosts(users, posts) {
            const container = document.getElementById('posts-container');
            
            posts.forEach(post => {
                // Находим пользователя, соответствующего посту
                const user = users.filter(u => u.id === post.userId)[0];
                
                // Создаем карточку поста
                const card = document.createElement('div');
                card.className = 'post-card';
                
                // Шапка карточки с именем пользователя
                const header = document.createElement('div');
                header.className = 'post-header';
                header.textContent = user ? user.name : 'Unknown User';
                
                // Тело карточки с title и body
                const title = document.createElement('div');
                title.className = 'post-title';
                title.textContent = post.title;
                
                const body = document.createElement('div');
                body.className = 'post-body';
                body.textContent = post.body;
                
                // Собираем карточку
                card.appendChild(header);
                card.appendChild(title);
                card.appendChild(body);
                
                // Добавляем карточку в контейнер
                container.appendChild(card);
            });
        }

        // Загружаем данные при загрузке страницы
        document.addEventListener('DOMContentLoaded', fetchData);
    </script>
</body>
</html>
